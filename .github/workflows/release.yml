name: Release

# Dispara ao empurrar uma tag de versão (ex: git tag v0.2.0 && git push --tags).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 → .deb, .rpm, .AppImage
          - platform: ubuntu-22.04
            target: ''
            args: ''
          # macOS Apple Silicon → .dmg/.app
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          # macOS Intel → .dmg/.app
          - platform: macos-13
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          # Windows x86_64 → .msi/.exe
          - platform: windows-latest
            target: ''
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Instalar dependências de sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev build-essential curl wget file libxdo-dev libssl-dev

      - run: npm ci

      - name: Build + bundle + upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para auto-update assinado, gere a chave (`npm run tauri signer generate`)
          # e adicione estes secrets no repositório:
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Maestro ${{ github.ref_name }}'
          releaseBody: 'Baixe o instalador da sua plataforma nos assets abaixo.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
